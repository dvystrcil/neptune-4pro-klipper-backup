####################################################################
# Homing and Gantry Adjustment Routines
####################################################################

[bed_mesh]
horizontal_move_z: 1.9
speed: 300
mesh_min: 20, 20
mesh_max: 215, 215
probe_count: 11,11 #51,51
algorithm: bicubic
zero_reference_position: 117.5,117.5
#scan_overshoot: 8  #uncomment this section if you still have room left over on the X axis for some scan overshoot to product smoother movements and more accurate scanning. Uncommenting this should be fine if you are using a standard voron mount.

# [safe_z_home]
# home_xy_position: 117.5, 117.5 #-24.0, 117.5 #117.5, 117.5 # Choose an X,Y position that is in the center of your bed. For a 300x300 machine that will be 150, 150. Use the same principle to calculate your bed center.
# z_hop: 0 #10
# z_hop_speed: 25
# speed: 200

[adxl345_probe]
coarse_home_fine_target: 2.232
coarse_home_eddy_offset: 0.265

[homing_override]
axes: z
gcode:
    G90
    SET_KINEMATIC_POSITION Z=0
    G0 Z10 F600
    M400
    {% if "x" not in printer.toolhead.homed_axes %}
        G28 X
    {% endif %}
    {% if "y" not in printer.toolhead.homed_axes %}
        G28 Y
    {% endif %}
    G0 X117.5 Y117.5 F6000
    M400
    HOME_Z

[z_tilt]
z_positions: -23, 117.5  # nozzle coordinates
			 291,117.5
points: 81,117.5         # probe coordinates
		249.5,117.5
speed: 250
horizontal_move_z: 10 #2.0
min_horizontal_move_z: 1.9
adaptive_horizontal_move_z: true
retries: 5
retry_tolerance: 0.01

[screws_tilt_adjust]
screw1_name: front left screw
screw1: 81, 34
screw2_name: rear left screw
screw2: 81, 204
screw3_name: rear right screw
screw3: 249.5, 204
screw4_name: front right screw
screw4: 249.5, 34
horizontal_move_z: 10
speed: 300
screw_thread: CW-M4  # Use CW for Clockwise and CCW for Counter Clockwise

[axis_twist_compensation]
calibrate_start_x: 58.75
calibrate_end_x: 176.25
calibrate_y: 117.5

[gcode_macro GET_BED_MESH]
gcode:
  G28
  # BED_MESH_CALIBRATE METHOD=rapid_scan
  EDDYNG_BED_MESH_EXPERIMENTAL

[gcode_macro FULL_HOME]
gcode:
  {% set need_x = 'x' not in printer.toolhead.homed_axes %}
  {% set need_y = 'y' not in printer.toolhead.homed_axes %}
  {% set need_z = 'z' not in printer.toolhead.homed_axes %}

  # Home only axes that are not homed
  {% if need_x and need_y and need_z %}
    G28
  {% else %}
    {% if need_x %}
      G28 X
    {% endif %}
    {% if need_y %}
      G28 Y
    {% endif %}
    #{% if need_z %}
      G28 Z
    #{% endif %}
  {% endif %}

  AWD_SYNC

  G90
  G0 X81 F5000
  M400 ; Wait for move to finish
  #Z_TILT_ADJUST SAMPLES=1 RETRY_TOLERANCE=0.015
  Z_TILT_ADJUST SAMPLES=1
  BRUSH

  # Move to center, and wait for the buffer to clear
  #G90
  G28 Z
  # G90
  # # G0 Z10 F1000 ; move to z10 before probe
  # G0 Z2 F1000  ; move to z2 to finish
  # G4 S1        ; chill for a sec
  # M400         ; Wait for move to finish
  # PROBE_EDDY_NG_PROBE_STATIC
  # PROBE_EDDY_NG_PROBE_STATIC HOME_Z=1
  # #G0 Z5 F1000 ; 5mm up
  # M400        ; Wait for move to finish

  # PROBE_EDDY_NG_SET_TAP_OFFSET VALUE=-0.47
  # PROBE_EDDY_NG_TAP SAMPLES=4 MAX_SAMPLES=9 USE_MEDIAN=1 #TARGET_Z=-0.350
  # #PROBE_EDDY_NG_TAP THRESHOLD=600 SAMPLES=3 MAX_SAMPLES=10 TARGET_Z=-0.700

[gcode_macro TEST_ZERO]
gcode:
  SET_HEATER_TEMPERATURE HEATER=extruder TARGET=225
  SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET=75
  SET_HEATER_TEMPERATURE HEATER=heater_bed_outer TARGET=75
  #PROBE_EDDY_NG_SET_TAP_OFFSET VALUE=-0.4
  FULL_HOME
  G90
  G1 X117.5 F12000
  G1 Y117.5 F12000
  G1 Z1.9 F900
  PROBE_EDDY_NG_PROBE_STATIC
  G1 Z0 F900

[gcode_macro Bed_Level_Screws_Tune]
gcode:
  BED_MESH_CLEAR
  SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET=75
  SET_HEATER_TEMPERATURE HEATER=heater_bed_outer TARGET=75
  G28
  TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM=72 MAXIMUM=75
  TEMPERATURE_WAIT SENSOR="heater_generic heater_bed_outer" MINIMUM=72 MAXIMUM=78
  SCREWS_TILT_CALCULATE

[gcode_macro Auto_Full_Bed_Level]
gcode:
  RESPOND PREFIX="info" MSG="Running Custom Bed Leveling Macro"
  BED_MESH_CLEAR
  SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET=60
  SET_HEATER_TEMPERATURE HEATER=heater_bed_outer TARGET=60
  G28
  TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM=58 MAXIMUM=65
  TEMPERATURE_WAIT SENSOR="heater_generic heater_bed_outer" MINIMUM=58 MAXIMUM=65
  BED_MESH_CALIBRATE
