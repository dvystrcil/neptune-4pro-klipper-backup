[maintain]
interval: 60 # optional, time (in seconds) between checking if maintenance needs to be done (default is 60)

# Lubricate XY rods
[maintain xyrods]
label: XY smooth rods
trigger: print_time
threshold: 250
message: Lubricate XY smooth rods

# Replace air filter
[maintain airfilter]
label: Air filter
trigger: time
threshold: 500
message: Replace HEPA and charcoal filters

# Extruder maintenance
[maintain extruder]
label: Extruder maintenance
trigger: filament
threshold: 700
message: Clean extruder gears and tighten extruder bolts

[maintain picommu]
label: PicoMMU maintenance
trigger: filament
threshold: 1000
message: Clean the cammed gears and lube the herringbone drive gear


# to clear a message
# UPDATE_MAINTENANCE NAME=xyrods

# Reset a tracked maintenance counter by component name. Call with no NAME to
# list the available components, then re-run with NAME=<component>. The list of
# valid components is built at runtime from the [maintain ...] config sections,
# so no edits to this macro are needed when components are added or removed.
[gcode_macro UPDATE_MAINT]
description: Reset a tracked maintenance counter. NAME= component (blank to list). Optional HOURS= passthrough.
gcode:
  {% set name = params.NAME|default('')|string|lower %}
  {% set hours = params.HOURS|default('')|string %}
  {% set settings = printer.configfile.settings %}
  {% set ns = namespace(names=[], lines=[]) %}
  {% for key in settings.keys()|sort %}
    {% if key.startswith('maintain ') %}
      {% set short = key.split(' ', 1)[1] %}
      {% set label = settings[key].label|default(short) %}
      {% set _ = ns.names.append(short) %}
      {% set _ = ns.lines.append(short ~ ' - ' ~ label) %}
    {% endif %}
  {% endfor %}
  {% if name == '' %}
    { action_respond_info('Tracked maintenance components:\n' ~ ns.lines|join('\n') ~ '\n\nRe-run UPDATE_MAINT NAME=<component>') }
  {% elif name not in ns.names %}
    { action_respond_info('Unknown component: ' ~ name ~ '\nTracked:\n' ~ ns.lines|join('\n')) }
  {% else %}
    {% if hours != '' %}
      UPDATE_MAINTENANCE NAME={name} HOURS={hours}
    {% else %}
      UPDATE_MAINTENANCE NAME={name}
    {% endif %}
    { action_respond_info('Reset maintenance counter: ' ~ name ~ (' (HOURS=' ~ hours ~ ')' if hours != '' else '')) }
  {% endif %}